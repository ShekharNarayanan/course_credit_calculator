<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGO Certificaat Checker · Tilburg University</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="1.5" fill="#2563EB"/>
          <rect x="13" y="3" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.25)"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.15)"/>
          <rect x="13" y="13" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.25)"/>
        </svg>
        <span>LOGO<span class="logo-dot">.</span>check</span>
      </div>
      <span class="header-subtitle">Tilburg University · TSB</span>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="nl">NL</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="pdf-btn-header" id="pdf-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <polyline points="9 15 12 18 15 15"/>
        </svg>
        Download rapport
      </button>
    </div>
  </header>

  <!-- ── App body ── -->
  <div class="app-body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <script type="module">
    import { init } from './js/app.js';
    init();
  </script>

</body>
</html>
